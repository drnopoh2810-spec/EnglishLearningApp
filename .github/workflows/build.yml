name: Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore EnglishLearningApp.csproj

      - name: Build (Release)
        run: dotnet build EnglishLearningApp.csproj --configuration Release --no-restore

      - name: Publish self-contained
        run: |
          dotnet publish EnglishLearningApp.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            --output ./publish/win-x64

      - name: Create portable ZIP
        run: Compress-Archive -Path ./publish/win-x64/* -DestinationPath EnglishLearningApp-win-x64-portable.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EnglishLearningApp-win-x64
          path: ./publish/win-x64/
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "English Learning App v1.0.${{ github.run_number }}"
          body: |
            ## English Learning App - Release v1.0.${{ github.run_number }}

            ### Download
            - **EnglishLearningApp-win-x64-portable.zip** — Extract the ZIP and run `EnglishLearningApp.exe` directly. No installation required.

            ### System Requirements
            - Windows 10/11 (x64)
            - No .NET runtime needed (self-contained)

            ### Features
            - Smart sentence-based English learning with Arabic translation
            - Spaced repetition algorithm (SM-2)
            - YouGlish pronunciation integration
            - Import/Export (CSV, Excel, JSON)
            - Dashboard with learning statistics
            - Dark/Light Material Design theme
          files: |
            EnglishLearningApp-win-x64-portable.zip
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
